name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Install dependencies
    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    # Create .env from secret
    - name: Setup environment
      run: |
        touch .env
        echo "${{ secrets.ANTESOFE }}" > .env

    # Build frontend
    - name: Build frontend
      run: NODE_OPTIONS="--max-old-space-size=4096" npm run build

    # Remove old build from EC2
    - name: Clean old build on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          rm -rf /home/ubuntu/anteso-frontend/dist/*

    # Upload new dist
    - name: Upload new build
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        source: "dist/*"
        target: "/home/ubuntu/anteso-frontend/dist"

    # Restart nginx
    - name: Restart Nginx
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          sudo systemctl restart nginx
